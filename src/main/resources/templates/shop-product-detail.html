<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/shop}">Product Detail</a>
        <a class="btn btn-outline-light" th:href="@{/logout}">Logout</a>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-5">
            <img th:if="${product.image != null}" th:src="${product.image}" class="img-fluid border"
                 alt="Product image" style="object-fit: contain; max-height: 400px;">
        </div>
        <div class="col-md-7">
            <h2 th:text="${product.name}">Product name</h2>
            <p class="mt-3">
                <strong>Price:</strong>
                <span th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}"></span>
            </p>
            <p>
                <strong>Category:</strong>
                <span th:text="${product.category != null ? product.category.name : 'N/A'}"></span>
            </p>
            <a th:href="@{/shop}" class="btn btn-secondary mt-3">Back to list</a>
        </div>
    </div>
</div>
</body>
</html>
