<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Save Product</h2>
    <form th:action="@{/products/save}" th:object="${product}" method="post" class="mt-4" enctype="multipart/form-data">
        <input type="hidden" th:field="*{id}" />

        
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" th:field="*{name}" class="form-control" required />
        </div>
        
        <div class="mb-3">
            <label class="form-label">Upload Image</label>
            <input type="file" name="imageFile" accept="image/*" class="form-control" />
            <div th:if="${product.image != null && !product.image.isEmpty()}" class="mt-2">
                <p class="mb-1 text-muted">Current image:</p>
                <img th:src="${product.image}" alt="Current" width="100" class="img-thumbnail" />
            </div>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="number" th:field="*{price}" class="form-control" required />
        </div>
        
        <div class="mb-3">
            <label class="form-label">Category</label>
            <select th:field="*{category}" class="form-select" required>
                <option value="" disabled>Select a category</option>
                <option th:each="cat : ${categories}" 
                        th:value="${cat.id}" 
                        th:text="${cat.name}">
                </option>
            </select>
        </div>
        
        <button type="submit" class="btn btn-success">Save</button>
        <a th:href="@{/products}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
