<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sản phẩm - Trang chủ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .product-img { height: 200px; object-fit: contain; }
        .card { transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/home">E-Shop</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link active" href="/home">Home</a></li>
            </ul>
            <div class="d-flex align-items-center">
                <a href="/cart" class="btn btn-outline-light me-3">
                    <i class="bi bi-cart3"></i> Giỏ hàng
                </a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-danger btn-sm">Đăng xuất</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">Danh sách sản phẩm</h2>
    
    <!-- Filter, Search, Sort Form -->
    <div class="card p-3 mb-4 shadow-sm">
        <form th:action="@{/home}" method="get" class="row g-3 align-items-end">
            <div class="col-md-4">
                <label for="keyword" class="form-label">Tên sản phẩm</label>
                <input type="text" id="keyword" name="keyword" th:value="${keyword}" class="form-control" placeholder="Nhập từ khóa tìm kiếm...">
            </div>
            <div class="col-md-3">
                <label for="categoryId" class="form-label">Danh mục</label>
                <select id="categoryId" name="categoryId" class="form-select">
                    <option value="">Tất cả danh mục</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == categoryId}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="sort" class="form-label">Sắp xếp theo giá</label>
                <select id="sort" name="sort" class="form-select">
                    <option value="price,asc" th:selected="${sort == 'price,asc'}">Giá tăng dần</option>
                    <option value="price,desc" th:selected="${sort == 'price,desc'}">Giá giảm dần</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-search"></i> Lọc
                </button>
            </div>
        </form>
    </div>

    <!-- Product Grid -->
    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-5 g-4 mb-5">
        <th:block th:if="${productPage.content.size() == 0}">
            <div class="col-12 text-center w-100 mt-5">
                <p class="text-muted fs-5">Không tìm thấy sản phẩm nào phù hợp.</p>
            </div>
        </th:block>
        <div class="col" th:each="product : ${productPage.content}">
            <div class="card h-100">
                <img th:src="${product.image != null && !product.image.isEmpty() ? product.image : 'https://via.placeholder.com/200'}" class="card-img-top product-img p-2" alt="Product">
                <div class="card-body d-flex flex-column">
                    <h6 class="card-title fw-bold text-truncate" th:text="${product.name}">Tên SP</h6>
                    <p class="card-text text-danger fw-bold" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">Giá</p>
                    <form th:action="@{/cart/add}" method="post" class="mt-auto">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <button type="submit" class="btn btn-outline-primary btn-sm w-100">
                            <i class="bi bi-cart-plus"></i> Thêm vào giỏ
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${productPage.totalPages > 1}" aria-label="Page navigation">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${productPage.first ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/home(page=${productPage.number - 1}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}" th:classappend="${productPage.number == i ? 'active' : ''}">
                <a class="page-link" th:href="@{/home(page=${i}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${productPage.last ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/home(page=${productPage.number + 1}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}">Next</a>
            </li>
        </ul>
    </nav>
</div>

</body>
</html>
