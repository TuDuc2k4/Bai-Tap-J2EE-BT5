<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Giỏ hàng của bạn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/home">E-Shop</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/home">Tiếp tục mua sắm</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container bg-white p-4 rounded shadow-sm mb-5">
    <h3 class="mb-4"><i class="bi bi-cart"></i> Giỏ hàng của bạn</h3>

    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <div th:if="${cartItems.empty}" class="text-center py-5">
        <h4 class="text-muted">Giỏ hàng rỗng</h4>
        <a href="/home" class="btn btn-primary mt-3">Quay lại mua sắm</a>
    </div>

    <div th:if="${!cartItems.empty}">
        <div class="table-responsive">
            <table class="table align-middle text-center table-bordered">
                <thead class="table-light">
                <tr>
                    <th>Sản phẩm</th>
                    <th>Hình ảnh</th>
                    <th>Đơn giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cartItems}">
                    <td class="fw-bold" th:text="${item.name}"></td>
                    <td>
                        <img th:src="${item.image != null && !item.image.isEmpty() ? item.image : 'https://via.placeholder.com/60'}" width="60" alt="Img" style="object-fit:contain;height:60px;">
                    </td>
                    <td class="text-danger" th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                    <td>
                        <div class="d-flex justify-content-center align-items-center">
                            <form th:action="@{/cart/update}" method="post">
                                <input type="hidden" name="productId" th:value="${item.productId}">
                                <input type="hidden" name="action" value="decrease">
                                <button type="submit" class="btn btn-sm btn-outline-secondary">-</button>
                            </form>
                            <span class="mx-3 fw-bold" th:text="${item.quantity}"></span>
                            <form th:action="@{/cart/update}" method="post">
                                <input type="hidden" name="productId" th:value="${item.productId}">
                                <input type="hidden" name="action" value="increase">
                                <button type="submit" class="btn btn-sm btn-outline-secondary">+</button>
                            </form>
                        </div>
                    </td>
                    <td class="text-danger fw-bold" th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                    <td>
                        <form th:action="@{/cart/remove}" method="post">
                            <input type="hidden" name="productId" th:value="${item.productId}">
                            <button type="submit" class="btn btn-danger btn-sm"><i class="bi bi-trash"></i> Xóa</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="row mt-4">
            <div class="col-md-6 offset-md-6 text-end">
                <h4 class="fw-bold">Tổng số tiền: 
                    <span class="text-danger ms-2" th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">0</span>
                </h4>
                <div class="mt-3">
                    <form th:action="@{/cart/checkout}" method="post">
                        <button type="submit" class="btn btn-success btn-lg px-5">Xác nhận đặt hàng</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
